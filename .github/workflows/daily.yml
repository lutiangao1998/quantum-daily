name: Daily Quantum Report

on:
  schedule:
    # 每天 UTC 00:05 触发（北京时间 08:05）
    - cron: '5 0 * * *'
  workflow_dispatch: # 允许在 GitHub 页面手动触发（测试用）

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Quantum Daily Pipeline
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://quantumnews-j6gvqm4g.manus.space/api/webhook/trigger \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Trigger failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Quantum Daily pipeline triggered successfully"
